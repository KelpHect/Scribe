version: '3'

info:
  companyName: "Scribe"
  productName: "Scribe"
  productIdentifier: "io.github.kellhect.scribe"
  description: "ESO addon manager"
  copyright: "(c) 2026 Scribe contributors"
  comments: "Desktop addon manager for The Elder Scrolls Online."
  version: "1.0.5"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 800
  ignore:
    dir:
      - .git
      - bin
      - build/reports
      - frontend
      - node_modules
    file:
      - .DS_Store
      - .gitignore
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
