version: '3'

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the Windows desktop binary.
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS: '{{.BUILD_FLAGS}}'
          DEV: '{{.DEV}}'
      - task: common:generate:icons
      - task: common:ensure:bin
    cmds:
      - task: generate:syso
        vars:
          ARCH: '{{.ARCH}}'
      - go build {{.BUILD_FLAGS}} -o "{{.BIN_DIR}}/{{.APP_NAME}}.exe"
      - cmd: powershell -NoProfile -Command "Remove-Item -Force 'wails_windows_{{.ARCH | default ARCH}}.syso'"
        platforms: [windows]
      - cmd: rm -f "wails_windows_{{.ARCH | default ARCH}}.syso"
        platforms: [linux, darwin]
    vars:
      BUILD_TAGS: '{{if eq .DEV "true"}}{{.EXTRA_TAGS}}{{else}}production{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}}{{end}}'
      DEFAULT_LD_FLAGS: '{{if eq .DEV "true"}}{{else}}-w -s -H windowsgui{{end}}'
      GO_LD_FLAGS: '{{.LD_FLAGS | default .DEFAULT_LD_FLAGS}}'
      BUILD_FLAGS: '{{if .BUILD_TAGS}}-tags "{{.BUILD_TAGS}}" {{end}}{{if ne .DEV "true"}}-trimpath {{end}}-buildvcs=false {{if .GO_LD_FLAGS}}-ldflags "{{.GO_LD_FLAGS}}"{{end}}'
    env:
      GOOS: windows
      GOARCH: '{{.ARCH | default ARCH}}'
      CGO_ENABLED: 0

  generate:syso:
    summary: Generates the Windows resource object.
    dir: build
    cmds:
      - wails3 generate syso -arch {{.ARCH | default ARCH}} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_{{.ARCH | default ARCH}}.syso

  package:
    summary: Packages Windows by building the portable executable.
    cmds:
      - task: build
        vars:
          ARCH: '{{.ARCH}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
          LD_FLAGS: '{{.LD_FLAGS}}'

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'
