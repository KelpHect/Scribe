name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            platform: windows/amd64
            build_tags: ""
          - name: Linux
            os: ubuntu-latest
            platform: linux/amd64
            build_tags: webkit2_41
          - name: macOS
            os: macos-latest
            platform: darwin/universal
            build_tags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Resolve build info
        id: info
        shell: bash
        run: |
          echo "VERSION=ci-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "COMMIT=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          build_args=(
            build
            -platform "${{ matrix.platform }}"
            -trimpath
            -ldflags "-s -w -X main.version=${{ steps.info.outputs.VERSION }} -X main.commit=${{ steps.info.outputs.COMMIT }} -X main.date=${{ steps.info.outputs.DATE }}"
          )

          if [ -n "${{ matrix.build_tags }}" ]; then
            build_args+=( -tags "${{ matrix.build_tags }}" )
          fi

          wails "${build_args[@]}"

      - name: Run Go tests
        run: go test ./...
