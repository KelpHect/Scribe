name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build_tags: ""
          - name: Linux
            os: ubuntu-latest
            build_tags: gtk3
          - name: macOS
            os: macos-latest
            build_tags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.99

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config npm libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        shell: bash
        run: |
          build_args=(
            build
          )

          if [ -n "${{ matrix.build_tags }}" ]; then
            build_args+=( -tags "${{ matrix.build_tags }}" )
          fi

          wails3 "${build_args[@]}"

      - name: Run frontend type checks
        run: npm --prefix frontend run check

      - name: Run Go tests
        run: go test ./...
