name: Tag Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate semantic version
        shell: bash
        run: |
          if ! [[ "${{ steps.version.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version in frontend/package.json: ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Check whether tag already exists
        id: tag_check
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Dispatch release workflow
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run release.yml --ref master -f release_tag="${{ steps.version.outputs.tag }}"

      - name: Report tag status
        shell: bash
        run: |
          if [ "${{ steps.tag_check.outputs.exists }}" = "true" ]; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Nothing to do."
          else
            echo "Created tag ${{ steps.version.outputs.tag }} and dispatched Release."
          fi
