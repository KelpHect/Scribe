name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to build and publish, for example v1.0.1
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  validate:
    name: Validate Release Tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate tag matches package version
        shell: bash
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid frontend/package.json version: $VERSION"
            exit 1
          fi

          EXPECTED_TAG="v$VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match frontend/package.json version $VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build_tags: ""
            target: windows
          - name: Linux
            os: ubuntu-latest
            build_tags: gtk3
            target: linux
          - name: macOS
            os: macos-latest
            build_tags: ""
            target: macos

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.99

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config npm libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Resolve version info
        id: info
        shell: bash
        run: |
          echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "COMMIT=${GITHUB_SHA::8}"       >> "$GITHUB_OUTPUT"
          echo "DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build production binary
        shell: bash
        run: |
          build_args=(
            task
          )

          if [ "${{ matrix.target }}" = "macos" ]; then
            build_args+=( darwin:package:universal )
          else
            build_args+=( build )
          fi

          windows_gui_flag=""
          if [ "${{ matrix.target }}" = "windows" ]; then
            windows_gui_flag="-H windowsgui "
          fi

          build_args+=( "LD_FLAGS=-s -w ${windows_gui_flag}-X main.version=${{ steps.info.outputs.VERSION }} -X main.commit=${{ steps.info.outputs.COMMIT }} -X main.date=${{ steps.info.outputs.DATE }}" )

          if [ -n "${{ matrix.build_tags }}" ]; then
            build_args+=( "EXTRA_TAGS=${{ matrix.build_tags }}" )
          fi

          wails3 "${build_args[@]}"

      - name: Verify macOS app signature
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --verify --deep --strict bin/Scribe.app

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p release

          if [ "${{ matrix.target }}" = "windows" ]; then
            cp bin/Scribe.exe release/Scribe-windows-amd64.exe

            installer=""
            for candidate in bin/*installer*.exe; do
              if [ -f "$candidate" ]; then
                installer="$candidate"
                break
              fi
            done

            if [ -n "$installer" ]; then
              cp "$installer" release/Scribe-windows-amd64-installer.exe
            else
              echo "No NSIS installer artifact found in bin. Publishing the portable Windows build only."
            fi
          elif [ "${{ matrix.target }}" = "linux" ]; then
            cp bin/Scribe release/Scribe-linux-amd64
          else
            ditto -c -k --sequesterRsrc --keepParent bin/Scribe.app release/Scribe-macos-universal.zip
          fi

      - name: Validate staged release assets
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "windows" ]; then
            test -s release/Scribe-windows-amd64.exe
            if [ -s release/Scribe-windows-amd64-installer.exe ]; then
              echo "Optional Windows installer staged."
            else
              echo "Optional Windows installer was not produced; publishing portable Windows build only."
            fi
          elif [ "${{ matrix.target }}" = "linux" ]; then
            test -s release/Scribe-linux-amd64
          else
            test -s release/Scribe-macos-universal.zip
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release-assets
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Scribe ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/**/*
