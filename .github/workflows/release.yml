name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to build and publish, for example v1.0.1
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            platform: windows/amd64
            build_tags: ""
            target: windows
          - name: Linux
            os: ubuntu-latest
            platform: linux/amd64
            build_tags: webkit2_41
            target: linux
          - name: macOS
            os: macos-latest
            platform: darwin/universal
            build_tags: ""
            target: macos

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install UPX
        if: runner.os != 'macOS'
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Resolve version info
        id: info
        shell: bash
        run: |
          echo "VERSION=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "COMMIT=${GITHUB_SHA::8}"       >> "$GITHUB_OUTPUT"
          echo "DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build production binary
        shell: bash
        run: |
          build_args=(
            build
            -platform "${{ matrix.platform }}"
            -trimpath
            -ldflags "-s -w -X main.version=${{ steps.info.outputs.VERSION }} -X main.commit=${{ steps.info.outputs.COMMIT }} -X main.date=${{ steps.info.outputs.DATE }}"
          )

          if [ "${{ matrix.target }}" = "windows" ]; then
            build_args+=( -nsis -upx -upxflags "--best --lzma" )
          elif [ "${{ matrix.target }}" = "linux" ]; then
            build_args+=( -upx -upxflags "--best --lzma" )
          fi

          if [ -n "${{ matrix.build_tags }}" ]; then
            build_args+=( -tags "${{ matrix.build_tags }}" )
          fi

          wails "${build_args[@]}"

      - name: Ad-hoc sign macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          codesign --force --deep --sign - build/bin/Scribe.app
          codesign --verify --deep --strict build/bin/Scribe.app

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p release

          if [ "${{ matrix.target }}" = "windows" ]; then
            cp build/bin/Scribe.exe release/Scribe-windows-amd64.exe

            installer=""
            for candidate in build/bin/*installer*.exe; do
              if [ -f "$candidate" ]; then
                installer="$candidate"
                break
              fi
            done

            if [ -n "$installer" ]; then
              cp "$installer" release/Scribe-windows-amd64-installer.exe
            else
              echo "No NSIS installer artifact found in build/bin. Publishing the portable Windows build only."
            fi
          elif [ "${{ matrix.target }}" = "linux" ]; then
            cp build/bin/Scribe release/Scribe-linux-amd64
          else
            ditto -c -k --sequesterRsrc --keepParent build/bin/Scribe.app release/Scribe-macos-universal.zip
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release-assets
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Scribe ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/**/*
